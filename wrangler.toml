#:schema node_modules/wrangler/config-schema.json
name = "twikoo-cloudflare"
main = "src/index.js"
compatibility_flags = ["nodejs_compat"]
compatibility_date = "2024-09-23"

# ===== D1 数据库（存评论、计数）=====
[[d1_databases]]
binding = "DB"
database_name = "twikoo-firely"
database_id = "0d8b6f15-2532-4aae-b932-3f97e2e5c225"

# ===== KV 存储（存后台配置、管理员Token）=====
[[kv_namespaces]]
binding = "CONFIG" 
id = "3fea0ec181ce4317a1ceb45e052dd5aa"
preview_id = "3fea0ec181ce4317a1ceb45e052dd5aa"

[vars]
# 这里可以保留 R2_PUBLIC_URL，但因为没有 R2，实际上不会用到
# 或者直接删除 R2 相关的环境变量
TWIKOO_SECRET = "phantomxjc"

[dev]
port = 5000
